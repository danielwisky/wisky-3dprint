<div id="img-lightbox" class="img-lightbox" hidden aria-hidden="true">
  <button type="button" class="img-lightbox-close" data-lightbox-close aria-label="Fechar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>
  <button type="button" class="img-lightbox-nav img-lightbox-prev" aria-label="Foto anterior" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  <img id="img-lightbox-img" class="img-lightbox-img" src="" alt="">
  <button type="button" class="img-lightbox-nav img-lightbox-next" aria-label="Próxima foto" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>
  <div class="img-lightbox-counter" hidden></div>
</div>
