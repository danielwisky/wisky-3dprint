- pergunta: "Quanto custa uma peça?"
  resposta: "O preço depende do peso e do tempo de impressão do modelo. Use a calculadora de estimativa aqui no site para ter uma ideia rápida. O valor final é confirmado no Instagram."
- pergunta: "Onde encontro o peso e o tempo de impressão do modelo?"
  resposta: "Na página do modelo no MakerWorld, na seção Print Profile: o tempo aparece ao lado do ícone de relógio, e ao passar o mouse sobre um perfil abre um painel com o peso total do filamento (em gramas). Use esses valores na calculadora de estimativa aqui do site."
- pergunta: "Qual material vocês usam?"
  resposta: "Imprimimos em PLA, um plástico resistente e com bom acabamento, ideal para a maioria das peças decorativas e funcionais."
- pergunta: "Qual o prazo de entrega?"
  resposta: "Em média de 3 a 7 dias após a aprovação do orçamento, dependendo da fila e do tamanho da peça."
- pergunta: "Vocês entregam em todo o Brasil?"
  resposta: "Sim! Enviamos pelos Correios para todo o Brasil. O frete é combinado junto com o orçamento no Instagram."
- pergunta: "Tem tamanho máximo de peça?"
  resposta: "Não há um limite fixo, avaliamos cada modelo. Peças maiores podem ser impressas em partes e montadas."
- pergunta: "Quais cores estão disponíveis?"
  resposta: "Você escolhe a cor e o acabamento que quiser; verificamos a disponibilidade sob consulta no Instagram."
