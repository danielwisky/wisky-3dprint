# Marcas parceiras exibidas na seção "Parceiros" da home.
# A seção fica escondida enquanto esta lista estiver vazia.
# Campos:
#   nome                - nome do parceiro (obrigatório)
#   logo                - caminho da imagem em assets/img/parceiros/ (obrigatório)
