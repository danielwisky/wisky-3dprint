# Peças em PRONTA ENTREGA (já impressas, envio imediato).
#
# Como usar:
#   - Adicione ou edite uma peça nos blocos abaixo.
#   - categoria:      agrupa a peça no filtro da página (chips no topo).
#     Use um rótulo curto e reaproveite os existentes (ex: "Personagens",
#     "Star Wars", "Acessórios"). Criar uma categoria nova = digitar um nome
#     novo; o chip aparece sozinho. Sem categoria, a peça vira "Outros".
#   - categorias:     (opcional) várias categorias de uma vez, como lista.
#     Ex:  categorias: ["Personagens", "Pokémon"]
#     A peça aparece em todos esses chips e é encontrada quando o cliente
#     combina filtros (ex: marcar "Personagens" + "Pokémon" ao mesmo tempo).
#     A ORDEM que você digita aqui é a ordem em que os selos aparecem no card
#     (costume: da categoria mais ampla para a mais específica). Já os chips do
#     filtro são ordenados sozinhos, em ordem alfabética.
#     Use "categoria" (uma) OU "categorias" (várias); se usar as duas,
#     "categorias" tem prioridade.
#   - preco:          apenas o número, em reais cheios (ex: preco: 265).
#     Não escreva "R$" nem centavos — o site formata o "R$" sozinho.
#     (Precisou de centavos/milhar? Me chame que ajusto a formatação.)
#   - Uma foto só:   use o campo  imagem: "/assets/img/estoque/arquivo.webp"
#   - Várias fotos:  use o campo  imagens:  (lista) — vira um carrossel no card.
#     A primeira da lista é a capa. Coloque os arquivos em /assets/img/estoque/.
#     Sem foto, o card mostra "Foto em breve".
#   - Vendeu? Apague o bloco da peça e ela some do site.
#   - Para deixar a vitrine vazia, deixe apenas:  pecas: []

